name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  node-tests:
    name: Node.js Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-deploy/node

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: agent-deploy/node/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-market

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: agent-market/requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio
      - run: pytest -v
